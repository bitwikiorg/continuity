<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <style>
    .bg { fill: #0d1117; }
    .sb { fill: #1c2128; stroke: #58a6ff; stroke-width: 2; }
    .hb { fill: #1c2128; stroke: #d29922; stroke-width: 2; }
    .lb { fill: #1c2128; stroke: #3fb950; stroke-width: 2; }
    .t { fill: #f0f6fc; font-family: sans-serif; font-size: 14px; font-weight: 700; }
    .s { fill: #8b949e; font-family: sans-serif; font-size: 11px; }
    .m { fill: #c9d1d9; font-family: sans-serif; font-size: 10px; }
    .e { stroke: #30363d; stroke-width: 1.5; fill: none; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fff; }
      .sb { fill: #ddf4ff; stroke: #0969da; }
      .hb { fill: #fff8c5; stroke: #bf8700; }
      .lb { fill: #dafbe1; stroke: #1a7f37; }
      .t { fill: #1f2328; }
      .s { fill: #656d76; }
      .m { fill: #424a53; }
      .e { stroke: #d0d7de; }
    }
  </style>
  <rect class="bg" width="600" height="280" rx="8"/>
  <rect class="sb" x="30" y="30" width="160" height="80" rx="6"/>
  <text class="t" x="110" y="55" text-anchor="middle">STATE</text>
  <text class="s" x="110" y="75" text-anchor="middle">Root .md files</text>
  <text class="m" x="110" y="95" text-anchor="middle">Overwrite in place</text>
  <rect class="hb" x="220" y="30" width="160" height="80" rx="6"/>
  <text class="t" x="300" y="55" text-anchor="middle">HISTORY</text>
  <text class="s" x="300" y="75" text-anchor="middle">Nested dirs</text>
  <text class="m" x="300" y="95" text-anchor="middle">Append, never modify</text>
  <rect class="lb" x="410" y="30" width="160" height="80" rx="6"/>
  <text class="t" x="490" y="55" text-anchor="middle">LIBRARY</text>
  <text class="s" x="490" y="75" text-anchor="middle">Nested dirs</text>
  <text class="m" x="490" y="95" text-anchor="middle">Curate: add, update, remove</text>
  <path class="e" d="M 110 110 L 110 150 L 300 150 L 300 110"/>
  <path class="e" d="M 300 110 L 300 150 L 490 150 L 490 110"/>
  <text class="s" x="300" y="180" text-anchor="middle">Old value snapshots to History before overwrite</text>
  <text class="s" x="110" y="210" text-anchor="middle">STATE.md TODO.md MEMORY.md</text>
  <text class="s" x="300" y="210" text-anchor="middle">snapshots/ completed/ logs/</text>
  <text class="s" x="490" y="210" text-anchor="middle">memory/ knowledge/</text>
  <text class="m" x="300" y="245" text-anchor="middle">What IS - What WAS - What is KNOWN</text>
</svg>